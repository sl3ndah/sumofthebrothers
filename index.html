    <script src="tracks.js"></script>
    <script>
        const DB_NAME = 'MusicCatalogDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'playCounts';
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'track' });
                    }
                };
            });
        }

        function setCookie(name, value, days = 3650) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/';
        }

        function getCookie(name) {
            return document.cookie.split('; ').reduce((r, v) => {
                const parts = v.split('=');
                return parts[0] === name ? decodeURIComponent(parts[1]) : r;
            }, '');
        }

        async function getPlayCount(track) {
            let counts = [];
            try { 
                const stored = localStorage.getItem('playCount_' + track);
                if (stored) counts.push(parseInt(stored));
            } catch (e) {}
            try {
                if (db) {
                    const transaction = db.transaction([STORE_NAME], 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(track);
                    await new Promise((resolve) => {
                        request.onsuccess = () => {
                            if (request.result) counts.push(request.result.count);
                            resolve();
                        };
                        request.onerror = () => resolve();
                    });
                }
            } catch (e) {}
            try {
                const cookieVal = getCookie('playCount_' + track);
                if (cookieVal) counts.push(parseInt(cookieVal));
            } catch (e) {}
            return counts.length > 0 ? Math.max(...counts) : 0;
        }

        async function savePlayCount(track, count) {
            try { localStorage.setItem('playCount_' + track, count); } catch (e) {}
            try {
                if (db) {
                    const transaction = db.transaction([STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    store.put({ track: track, count: count });
                }
            } catch (e) {}
            try { setCookie('playCount_' + track, count); } catch (e) {}
        }

        async function incrementPlayCount(track) {
            const currentCount = await getPlayCount(track);
            const newCount = currentCount + 1;
            await savePlayCount(track, newCount);
            return newCount;
        }


        const R2_BASE_URL = 'https://pub-69412c75c80941dc9629fda6c33bf81c.r2.dev';

        const audioPlayer = document.getElementById('audio-player');
        let currentArtist = null;
        let currentTrack = null;
        let currentVersion = null;
        let repeatMode = 'off';
        let shuffleMode = 'off';
        let autoplaying = true;
        let isPlaying = false;
        let playQueue = [];
        let currentQueueIndex = 0;
        let activeGroupBy = 'artist';
        let activeSortField = 'uploadDate';
        let activeSortDirection = 'desc';
        let activeFilters = [];
        let searchTerm = '';

        function buildQueue(startArtist, startTrack, startVersion) {
            playQueue = [];
            const trackData = tracksData[startArtist][startTrack];
            
            if (shuffleMode === 'all') {
                const allVersions = [];
                Object.entries(tracksData).forEach(([artist, tracks]) => {
                    Object.entries(tracks).forEach(([trackKey, trackData]) => {
                        trackData.versions.forEach(v => {
                            allVersions.push({ artist, trackKey, versionFile: v.file });
                        });
                    });
                });
                for (let i = allVersions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allVersions[i], allVersions[j]] = [allVersions[j], allVersions[i]];
                }
                playQueue = allVersions;
            } else if (shuffleMode === 'versions') {
                const versions = [...trackData.versions];
                for (let i = versions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [versions[i], versions[j]] = [versions[j], versions[i]];
                }
                playQueue = versions.map(v => ({ artist: startArtist, trackKey: startTrack, versionFile: v.file }));
            } else {
                const versions = [...trackData.versions].sort((a, b) => b.version - a.version);
                const highestVersion = versions[0];
                const otherVersions = [...trackData.versions].filter(v => v.version !== highestVersion.version).sort((a, b) => a.version - b.version);
                const orderedVersions = [highestVersion, ...otherVersions];
                
                if (repeatMode === 'all') {
                    Object.entries(tracksData).forEach(([artist, tracks]) => {
                        Object.entries(tracks).forEach(([trackKey, trackData]) => {
                            const trackVersions = [...trackData.versions].sort((a, b) => b.version - a.version);
                            const highest = trackVersions[0];
                            const others = [...trackData.versions].filter(v => v.version !== highest.version).sort((a, b) => a.version - b.version);
                            const ordered = [highest, ...others];
                            ordered.forEach(v => {
                                playQueue.push({ artist, trackKey, versionFile: v.file });
                            });
                        });
                    });
                } else {
                    playQueue = orderedVersions.map(v => ({ artist: startArtist, trackKey: startTrack, versionFile: v.file }));
                }
            }
            
            currentQueueIndex = playQueue.findIndex(item => 
                item.artist === startArtist && item.trackKey === startTrack && item.versionFile === startVersion
            );
            if (currentQueueIndex === -1) currentQueueIndex = 0;
        }

        function playNext() {
            if (!currentTrack || playQueue.length === 0) return;
            
            if (repeatMode === 'track') {
                playVersion(currentArtist, currentTrack, currentVersion);
                return;
            }
            
            currentQueueIndex++;
            
            if (currentQueueIndex >= playQueue.length) {
                if (repeatMode === 'versions' || repeatMode === 'all') {
                    currentQueueIndex = 0;
                } else {
                    return;
                }
            }
            
            const next = playQueue[currentQueueIndex];
            playVersion(next.artist, next.trackKey, next.versionFile, false);
        }

        function playPrevious() {
            if (!currentTrack || playQueue.length === 0) return;
            
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
                return;
            }
            
            currentQueueIndex--;
            
            if (currentQueueIndex < 0) {
                if (repeatMode === 'versions' || repeatMode === 'all') {
                    currentQueueIndex = playQueue.length - 1;
                } else {
                    currentQueueIndex = 0;
                    audioPlayer.currentTime = 0;
                    return;
                }
            }
            
            const prev = playQueue[currentQueueIndex];
            playVersion(prev.artist, prev.trackKey, prev.versionFile, false);
        }

        async function playTrack(artist, trackKey) {
            const track = tracksData[artist][trackKey];
            if (!track || !track.versions.length) return;
            
            const versions = [...track.versions].sort((a, b) => b.version - a.version);
            const highestVersion = versions[0];
            
            await playVersion(artist, trackKey, highestVersion.file);
        }

        async function playVersion(artist, trackKey, versionFile, rebuildQueue = true) {
            const track = tracksData[artist][trackKey];
            if (!track) return;

            // Manual play cancels any active Play All queue
            if (rebuildQueue) playAllActive = false;

            currentArtist = artist;
            currentTrack = trackKey;
            currentVersion = versionFile;

            if (rebuildQueue) {
                buildQueue(artist, trackKey, versionFile);
            }

            const url = `${R2_BASE_URL}/${artist}/${trackKey}/${versionFile}`;
            
            audioPlayer.src = url;
            
            try {
                await audioPlayer.play();
                isPlaying = true;
            } catch (error) {
                console.error('Play error:', error);
                return;
            }

            document.querySelectorAll('.play-btn-track, .play-btn-version').forEach(btn => {
                btn.textContent = 'Play';
            });

            // Reveal player if it was hidden
            const footer = document.getElementById('player-footer');
            if (footer.classList.contains('hidden')) {
                footer.classList.remove('hidden');
                document.getElementById('player-toggle').textContent = '▲';
            }
            document.getElementById('now-playing').textContent = `${artist} - ${trackKey} - ${versionFile.replace('.mp3', '')}`;
            document.getElementById('play-pause-btn').textContent = '⏸';

            const trackGroup = document.querySelector(`[data-artist="${artist}"][data-track-key="${trackKey}"].track-group`);
            if (trackGroup) {
                const trackBtn = trackGroup.querySelector('.play-btn-track');
                if (trackBtn) trackBtn.textContent = 'Pause';
            }

            const versionItem = document.querySelector(`[data-artist="${artist}"][data-track-key="${trackKey}"][data-version-file="${versionFile}"]`);
            if (versionItem) {
                const versionBtn = versionItem.querySelector('.play-btn-version');
                if (versionBtn) versionBtn.textContent = 'Pause';
            }

            const trackCount = await incrementPlayCount(`${artist}/${trackKey}`);
            const versionCount = await incrementPlayCount(`${artist}/${trackKey}/${versionFile}`);

            updatePlayCountDisplays(artist, trackKey, versionFile, trackCount, versionCount);
            updatePlayingState(artist, trackKey, versionFile);
        }

        function updatePlayCountDisplays(artist, trackKey, versionFile, trackCount, versionCount) {
            const trackGroup = document.querySelector(`[data-artist="${artist}"][data-track-key="${trackKey}"].track-group`);
            if (trackGroup) {
                const trackPlays = trackGroup.querySelector('.track-plays');
                if (trackPlays) trackPlays.textContent = `plays: ${trackCount}`;
            }

            const versionItem = document.querySelector(`[data-artist="${artist}"][data-track-key="${trackKey}"][data-version-file="${versionFile}"]`);
            if (versionItem) {
                const versionPlays = versionItem.querySelector('.version-plays');
                if (versionPlays) versionPlays.textContent = `plays: ${versionCount}`;
            }
        }

        function updatePlayingState(artist, trackKey, versionFile) {
            document.querySelectorAll('.track-header, .version-item').forEach(el => {
                el.classList.remove('playing');
            });

            const trackGroup = document.querySelector(`[data-artist="${artist}"][data-track-key="${trackKey}"].track-group`);
            if (trackGroup) {
                trackGroup.querySelector('.track-header').classList.add('playing');
            }

            const versionItem = document.querySelector(`[data-artist="${artist}"][data-track-key="${trackKey}"][data-version-file="${versionFile}"]`);
            if (versionItem) {
                versionItem.classList.add('playing');
            }
        }

        // Flatten all tracks across all artists into one array
        function getAllTracks() {
            const all = [];
            for (const [artist, tracks] of Object.entries(tracksData)) {
                for (const [key, data] of Object.entries(tracks)) {
                    all.push({ key, artist, ...data });
                }
            }
            return all;
        }

        // Returns array of group keys for a track (a track can land in multiple groups)
        function getGroupKeys(track) {
            switch (activeGroupBy) {
                case 'artist':
                    return [track.artist];
                case 'genre': {
                    const set = new Set();
                    (track.versions || []).forEach(v => (v.genre || []).forEach(g => set.add(g)));
                    return set.size ? [...set] : ['No Genre'];
                }
                case 'mood': {
                    const set = new Set();
                    (track.versions || []).forEach(v => (v.mood || []).forEach(m => set.add(m)));
                    return set.size ? [...set] : ['No Mood'];
                }
                case 'playlist':
                    return [track.playlist || 'No Playlist'];
                case 'none':
                    return ['__flat__'];
                default:
                    return [track.artist];
            }
        }

        async function renderTracks() {
            const trackList = document.getElementById('track-list');
            trackList.innerHTML = '';

            let allTracks = getAllTracks();
            allTracks = applyFilters(allTracks);
            if (searchTerm) {
                allTracks = allTracks.filter(t => t.key.toLowerCase().includes(searchTerm));
            }
            allTracks = trimVersions(allTracks);
            allTracks = sortTracks(allTracks);

            if (activeGroupBy === 'none') {
                // Flat list
                for (const track of allTracks) {
                    trackList.appendChild(await renderTrackGroup(track.artist, track));
                }
            } else {
                // Build ordered group map — tracks can appear in multiple groups
                const groups = new Map();
                for (const track of allTracks) {
                    for (const gk of getGroupKeys(track)) {
                        if (!groups.has(gk)) groups.set(gk, []);
                        groups.get(gk).push(track);
                    }
                }

                for (const [groupName, tracks] of groups) {
                    const groupEl = document.createElement('li');
                    groupEl.className = 'artist-group';

                    const header = document.createElement('div');
                    header.className = 'artist-group-header';
                    header.innerHTML = `
                    <button class="collapse-btn"></button>
                    <span class="artist-group-name">${groupName}</span>
                        <span class="artist-group-count">(${tracks.length} track${tracks.length !== 1 ? 's' : ''})</span>
                    `;

                    const container = document.createElement('div');
                    container.className = 'artist-group-tracks';

                    for (const track of tracks) {
                        container.appendChild(await renderTrackGroup(track.artist, track));
                    }

                    groupEl.appendChild(header);
                    groupEl.appendChild(container);
                    trackList.appendChild(groupEl);
                }

                // Group collapse handlers
                document.querySelectorAll('.artist-group-header').forEach(header => {
                    header.addEventListener('click', () => {
                        const group = header.closest('.artist-group');
                        const container = group.querySelector('.artist-group-tracks');
                        const btn = header.querySelector('.collapse-btn');
                        if (container.classList.contains('expanded')) {
                            container.classList.remove('expanded');
                            btn.classList.remove('expanded');
                        } else {
                            container.classList.add('expanded');
                            btn.classList.add('expanded');
                        }
                    });
                });
            }

            attachEventListeners();
        }

        function sortTracks(arr) {
            if (activeSortField === 'random') {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            const dir = activeSortDirection === 'asc' ? 1 : -1;

            return arr.sort((a, b) => {
                switch (activeSortField) {
                    case 'uploadDate': {
                        const da = new Date(a.uploadedDate || a.releaseDate || 0);
                        const db = new Date(b.uploadedDate || b.releaseDate || 0);
                        return (da - db) * dir;
                    }
                    case 'title':
                        return a.title.localeCompare(b.title) * dir;
                    case 'duration': {
                        const da = a.duration || 0;
                        const db = b.duration || 0;
                        return (da - db) * dir;
                    }
                    case 'bpm': {
                        const getBpm = (t) => {
                            let max = 0;
                            (t.versions || []).forEach(v => {
                                (v.bpm || []).forEach(val => { const n = parseFloat(val); if (n > max) max = n; });
                            });
                            return max;
                        };
                        return (getBpm(a) - getBpm(b)) * dir;
                    }
                    case 'playCount': {
                        const ca = a._playCount || 0;
                        const cb = b._playCount || 0;
                        return (ca - cb) * dir;
                    }
                    default:
                        return 0;
                }
            });
        }

        async function renderTrackGroup(artist, track) {
            const trackPlayCount = await getPlayCount(`${artist}/${track.key}`);
            const isMultiVersion = track.versions.length > 1;
            
            const trackGroup = document.createElement('li');
            trackGroup.className = 'track-group';
            trackGroup.dataset.artist = artist;
            trackGroup.dataset.trackKey = track.key;

            if (isMultiVersion) {
                // Multi-version: collapsible header + nested version list
                const trackHeader = document.createElement('div');
                trackHeader.className = 'track-header';
                trackHeader.innerHTML = `
                    <button class="collapse-btn"></button>
                    <span class="track-name">${track.title}</span>
                    <button class="play-btn-track">Play</button>
                    <span class="track-plays">plays: ${trackPlayCount}</span>
                `;
                trackGroup.appendChild(trackHeader);

                const versionList = document.createElement('ul');
                versionList.className = 'version-list';

                for (const version of track.versions) {
                    versionList.appendChild(await renderVersionItem(artist, track.key, version));
                }

                trackGroup.appendChild(versionList);
            } else {
                // Single version: flat row, no collapse
                const version = track.versions[0];
                const versionPlayCount = await getPlayCount(`${artist}/${track.key}/${version.file}`);

                const row = document.createElement('div');
                row.className = 'track-header single-version';
                row.innerHTML = `
                    <span class="track-name">${track.title}</span>
                    <button class="play-btn-version" data-artist="${artist}" data-track-key="${track.key}" data-version-file="${version.file}">Play</button>
                    <span class="track-plays">plays: ${versionPlayCount}</span>
                    <div class="version-controls">
                        <button class="menu-btn" data-artist="${artist}" data-track-key="${track.key}" data-version-file="${version.file}">⋮</button>
                    </div>
                `;
                trackGroup.appendChild(row);

                // Also stamp the version file on the trackGroup so playing state can find it
                trackGroup.dataset.versionFile = version.file;
            }

            return trackGroup;
        }

        async function renderVersionItem(artist, trackKey, version) {
            const versionPlayCount = await getPlayCount(`${artist}/${trackKey}/${version.file}`);

            const versionItem = document.createElement('li');
            versionItem.className = 'version-item';
            versionItem.dataset.artist = artist;
            versionItem.dataset.trackKey = trackKey;
            versionItem.dataset.versionFile = version.file;
            versionItem.innerHTML = `
                <span class="version-name">${version.file.replace('.mp3', '')}</span>
                <button class="play-btn-version">Play</button>
                <span class="version-plays">plays: ${versionPlayCount}</span>
                <div class="version-controls">
                    <button class="menu-btn">⋮</button>
                </div>
            `;
            return versionItem;
        }

        function attachEventListeners() {
            document.querySelectorAll('.collapse-btn').forEach(btn => {
                const parent = btn.closest('.track-group');
                if (parent) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const versionList = parent.querySelector('.version-list');
                        const isExpanded = versionList.classList.contains('expanded');
                        
                        if (isExpanded) {
                            versionList.classList.remove('expanded');
                            btn.classList.remove('expanded');
                        } else {

        function showVersionMenu(artist, trackKey, versionFile, button) {
            const url = `${R2_BASE_URL}/${artist}/${trackKey}/${versionFile}`;
            
            const menu = document.createElement('div');
            menu.style.cssText = 'position:fixed;background:#222;border:1px solid #444;padding:8px 0;z-index:1000;';
            menu.innerHTML = `
                <div style="padding:8px 15px;cursor:pointer;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='transparent'">Download</div>
                <div style="padding:8px 15px;cursor:pointer;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='transparent'">Copy Link</div>
            `;
            
            const rect = button.getBoundingClientRect();
            menu.style.left = rect.left + 'px';
            menu.style.top = (rect.bottom + 5) + 'px';
            
            menu.children[0].onclick = () => {

                link.href = url;
                link.download = versionFile;
                link.click();
                document.body.removeChild(menu);
            };
            
            menu.children[1].onclick = () => {

                const trackUrl = `${baseUrl}?track=${encodeURIComponent(versionFile)}`;
                navigator.clipboard.writeText(trackUrl);
                alert('Link copied!');
                document.body.removeChild(menu);
            };
            
            document.body.appendChild(menu);
            
            setTimeout(() => {
                document.addEventListener('click', function removeMenu() {

        // ── Filter definitions ─────────────────────────────────────
        // Maps each filter field to its label, available conditions, and defaults
        const FILTER_DEFS = {
            uploaded:        { label: 'Uploaded',  conditions: ['after','before','between'], default: 'after',  valueType: 'date' },
            created:         { label: 'Created',   conditions: ['after','before','between'], default: 'after',  valueType: 'date' },
            released:        { label: 'Released',  conditions: ['after','before','between'], default: 'after',  valueType: 'date' },
            artist:          { label: 'Artist',    conditions: ['is','is not'],              default: 'is',      valueType: 'text' },
            genre:           { label: 'Genre',     conditions: ['contains','does not contain'], default: 'contains', valueType: 'text' },
            mood:            { label: 'Mood',      conditions: ['contains','does not contain'], default: 'contains', valueType: 'text' },
            bpm:             { label: 'BPM',       conditions: ['equals','between'],         default: 'equals',  valueType: 'number' },
            key:             { label: 'Key',       conditions: ['is','is not'],              default: 'is',      valueType: 'text' },
            tags:            { label: 'Tags',      conditions: ['contains','does not contain'], default: 'contains', valueType: 'text' },
            latestOnly:      { label: 'Latest only',  conditions: [],                       default: null,      valueType: 'none' },
            firstOnly:       { label: 'First only',   conditions: [],                       default: null,      valueType: 'none' },
            specificVersion: { label: 'Specific #',   conditions: [],                       default: null,      valueType: 'number' },
            hasLyrics:       { label: 'Has lyrics',   conditions: [],                       default: null,      valueType: 'none' },
            hasNotes:        { label: 'Has notes',    conditions: [],                       default: null,      valueType: 'none' },
        };

        // ── Version trimming ──────────────────────────────────────
        // Runs after filtering. If a version filter is active, returns shallow
        // copies of each track with the versions array trimmed down.
        // Without a version filter active this is a no-op (returns the same array).
        function trimVersions(tracks) {
            const versionFilter = activeFilters.find(f =>
                f.field === 'latestOnly' || f.field === 'firstOnly' || f.field === 'specificVersion'
            );
            if (!versionFilter) return tracks;

            return tracks.map(track => {
                let kept;
                const sorted = [...track.versions].sort((a, b) => a.version - b.version);

                switch (versionFilter.field) {
                    case 'latestOnly':
                        kept = [sorted[sorted.length - 1]]; // highest version number
                        break;
                    case 'firstOnly':
                        kept = [sorted[0]]; // lowest version number
                        break;
                    case 'specificVersion': {
                        const num = parseInt(versionFilter.value);
                        kept = sorted.filter(v => v.version === num);
                        break;
                    }
                    default:
                        kept = track.versions;
                }

                return { ...track, versions: kept };
            });
        }

        // ── Filter engine ──────────────────────────────────────────
        function applyFilters(tracks) {
            if (activeFilters.length === 0) return tracks;

            return tracks.filter(track => {
                return activeFilters.every(f => filterTrack(track, f));
            });
        }

        function filterTrack(track, f) {
            switch (f.field) {
                // ── Time filters ──
                case 'uploaded': {
                    const d = new Date(track.uploadedDate || track.releaseDate || 0);
                    return dateConditionPass(d, f);
                }
                case 'created': {
                    const d = new Date(track.createdDate || 0);
                    return dateConditionPass(d, f);
                }
                case 'released': {
                    const d = new Date(track.releaseDate || 0);
                    return dateConditionPass(d, f);
                }

                // ── Metadata filters ──
                case 'artist': {
                    const match = track.artist === f.value;
                    return f.condition === 'is' ? match : !match;
                }
                case 'genre': {
                    const genres = new Set();
                    (track.versions || []).forEach(v => (v.genre || []).forEach(g => genres.add(g.toLowerCase())));
                    const has = genres.has(f.value.toLowerCase());
                    return f.condition === 'contains' ? has : !has;
                }
                case 'mood': {
                    const moods = new Set();
                    (track.versions || []).forEach(v => (v.mood || []).forEach(m => moods.add(m.toLowerCase())));
                    const has = moods.has(f.value.toLowerCase());
                    return f.condition === 'contains' ? has : !has;
                }
                case 'bpm': {
                    const bpms = [];
                    (track.versions || []).forEach(v => (v.bpm || []).forEach(b => { const n = parseFloat(b); if (!isNaN(n)) bpms.push(n); }));
                    if (bpms.length === 0) return false;
                    if (f.condition === 'equals') return bpms.some(b => b === parseFloat(f.value));
                    if (f.condition === 'between') {
                        const lo = parseFloat(f.value), hi = parseFloat(f.value2);
                        return bpms.some(b => b >= lo && b <= hi);
                    }
                    return false;
                }
                case 'key': {
                    const keys = new Set();
                    (track.versions || []).forEach(v => (v.key || []).forEach(k => keys.add(k.toLowerCase())));
                    const has = keys.has(f.value.toLowerCase());
                    return f.condition === 'is' ? has : !has;
                }
                case 'tags': {
                    // Search across artist, track, and version level tags
                    const allTags = new Set();
                    (track.tags || []).forEach(t => allTags.add(t.toLowerCase()));
                    (track.versions || []).forEach(v => (v.tags || []).forEach(t => allTags.add(t.toLowerCase())));
                    const has = allTags.has(f.value.toLowerCase());
                    return f.condition === 'contains' ? has : !has;
                }

                // ── Version filters ──
                case 'latestOnly': {
                    // Track passes if it has a highest version — we don't remove the track,
                    // but this flag is handled at render time to show only that version.
                    // For filtering purposes the track itself stays.
                    return true;
                }
                case 'firstOnly':
                    return true; // same — render-time filter
                case 'specificVersion': {
                    const num = parseInt(f.value);
                    return (track.versions || []).some(v => v.version === num);
                }

                // ── Other filters ──
                case 'hasLyrics':
                    return (track.versions || []).some(v => v.lyrics && v.lyrics.trim().length > 0);
                case 'hasNotes':
                    return (track.versions || []).some(v => v.notes && v.notes.trim().length > 0);

                default:
                    return true;
            }
        }

        function dateConditionPass(date, f) {
            if (date.getTime() === 0) return false; // no date set
            if (f.condition === 'after')  return date >= new Date(f.value);
            if (f.condition === 'before') return date <= new Date(f.value);
            if (f.condition === 'between') {
                const lo = new Date(f.value), hi = new Date(f.value2);
                return date >= lo && date <= hi;
            }
            return false;
        }

        // ── Filter UI ──────────────────────────────────────────────
        function renderChips() {
            const container = document.getElementById('filter-chips');
            container.innerHTML = '';
            activeFilters.forEach((f, idx) => {
                container.appendChild(buildChip(f, idx));
            });
            // Mark Filter button active when chips exist
            document.querySelector('.ctrl-btn[data-panel="filter"]').classList.toggle('active', activeFilters.length > 0);
        }

        function buildChip(f, idx) {
            const def = FILTER_DEFS[f.field];
            const chip = document.createElement('div');
            chip.className = 'filter-chip';

            let html = `<span class="chip-label">${def.label}</span>`;

            // Condition selector (only for filters that have conditions)
            if (def.conditions.length > 0) {
                html += `<select class="chip-condition" data-idx="${idx}">`;
                def.conditions.forEach(c => {
                    html += `<option value="${c}" ${f.condition === c ? 'selected' : ''}>${c}</option>`;
                });
                html += `</select>`;
            }

            // Value input(s)
            if (def.valueType === 'date') {
                html += `<input type="date" class="chip-value" data-idx="${idx}" value="${f.value || ''}">`;
                if (f.condition === 'between') {
                    html += `<span class="chip-between">–</span>`;
                    html += `<input type="date" class="chip-value2" data-idx="${idx}" value="${f.value2 || ''}">`;
                }
            } else if (def.valueType === 'number') {
                if (f.field === 'specificVersion') {
                    html += `<input type="number" class="chip-value" data-idx="${idx}" placeholder="#" value="${f.value || ''}" min="1" step="1">`;
                } else if (f.condition === 'between') {
                    html += `<input type="number" class="chip-value" data-idx="${idx}" placeholder="min" value="${f.value || ''}">`;
                    html += `<span class="chip-between">–</span>`;
                    html += `<input type="number" class="chip-value2" data-idx="${idx}" placeholder="max" value="${f.value2 || ''}">`;
                } else {
                    html += `<input type="number" class="chip-value" data-idx="${idx}" placeholder="value" value="${f.value || ''}">`;
                }
            } else if (def.valueType === 'text') {
                html += `<input type="text" class="chip-value" data-idx="${idx}" placeholder="${def.label.toLowerCase()}" value="${f.value || ''}">`;
            }
            // valueType === 'none' gets no input (latestOnly, firstOnly, hasLyrics, hasNotes)

            html += `<button class="chip-remove" data-idx="${idx}">×</button>`;
            chip.innerHTML = html;
            return chip;
        }

        function wireChipEvents() {
            // Condition change → re-render chip (may add/remove value2 input) + re-filter
            document.querySelectorAll('.chip-condition').forEach(sel => {
                sel.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    activeFilters[idx].condition = e.target.value;
                    // Reset value2 if switching away from 'between'
                    if (e.target.value !== 'between') activeFilters[idx].value2 = '';
                    renderChips();
                    wireChipEvents();
                    renderTracks();
                });
            });

            // Value input → update filter + re-render
            document.querySelectorAll('.chip-value').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    activeFilters[idx].value = e.target.value;
                    renderTracks();
                });
            });

            document.querySelectorAll('.chip-value2').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    activeFilters[idx].value2 = e.target.value;
                    renderTracks();
                });
            });

            // Remove button
            document.querySelectorAll('.chip-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    activeFilters.splice(idx, 1);
                    renderChips();
                    wireChipEvents();
                    renderTracks();
                });
            });
        }

            playQueue = allTracks.map(track => {

            audioPlayer.volume = e.target.value / 100;
        });

        audioPlayer.addEventListener('timeupdate', () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('current-time').textContent = formatTime(audioPlayer.currentTime);
            document.getElementById('duration-time').textContent = formatTime(audioPlayer.duration);
        });

        document.getElementById('progress-bar').addEventListener('click', (e) => {
            const progressBar = e.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percentage = clickX / rect.width;
            audioPlayer.currentTime = audioPlayer.duration * percentage;
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function loadTrackFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const trackParam = urlParams.get('track');
            
            if (trackParam) {
                for (const [artist, tracks] of Object.entries(tracksData)) {
                    for (const [trackKey, trackData] of Object.entries(tracks)) {
                        const version = trackData.versions.find(v => v.file === trackParam);
                        if (version) {
                            document.title = `${artist} - ${trackKey} - cooljoe`;
                            setTimeout(() => {
                                playVersion(artist, trackKey, version.file);
                            }, 500);
                            return;
                        }
                    }
                }
            }
        }

        // ── Player hide/reveal toggle ─────────────────────────────
        document.getElementById('player-toggle').addEventListener('click', (e) => {
            e.stopPropagation();
            const footer = document.getElementById('player-footer');
            const btn = document.getElementById('player-toggle');
            footer.classList.toggle('hidden');
            btn.textContent = footer.classList.contains('hidden') ? '▼' : '▲';
        });

        // ── Autoplay random track on first user gesture ───────────
        let autoplayed = false;
        function pickRandomTrack() {
            const all = getAllTracks();
            if (all.length === 0) return;
            const track = all[Math.floor(Math.random() * all.length)];
            const versions = [...track.versions].sort((a, b) => b.version - a.version);
            playVersion(track.artist, track.key, versions[0].file);
        }

        function onFirstGesture() {
            if (autoplayed) return;
            autoplayed = true;
            document.removeEventListener('click', onFirstGesture);
            document.removeEventListener('touchstart', onFirstGesture);
            // Back off if the user already triggered a track manually
            if (currentTrack) return;
            pickRandomTrack();
        }

        document.addEventListener('click', onFirstGesture);
        document.addEventListener('touchstart', onFirstGesture);

        async function init() {
            await initDB();
            await renderTracks();
            loadTrackFromURL();
        }

        init();
    </script>
</body>
</html>
